<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Today's Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend Deca', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 0;
        }

        .phone-wrapper {
            width: 375px;
            min-height: 812px;
            background: #fff;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        /* Background blobs */
        .bg-blobs {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-blobs::before {
            content: '';
            position: absolute;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(95,51,225,0.12) 0%, transparent 70%);
            top: -40px; right: -40px;
            border-radius: 50%;
        }
        .bg-blobs::after {
            content: '';
            position: absolute;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(171,148,255,0.18) 0%, transparent 70%);
            bottom: 120px; left: -30px;
            border-radius: 50%;
        }

        .content {
            position: relative;
            z-index: 1;
            padding-bottom: 90px;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 22px 0;
        }
        .topbar .back-btn {
            width: 24px; height: 24px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .topbar .back-btn svg { width: 20px; height: 20px; }
        .topbar h1 {
            font-size: 19px;
            font-weight: 600;
            color: #24252c;
        }
        .topbar .notif-btn {
            width: 24px; height: 24px;
            cursor: pointer;
            position: relative;
        }
        .notif-dot {
            position: absolute;
            top: 0; right: 0;
            width: 8px; height: 8px;
            background: #f56565;
            border-radius: 50%;
        }

        /* ── Date picker ── */
        .date-picker {
            display: flex;
            gap: 6px;
            padding: 18px 4px 0;
            justify-content: center;
        }
        .date-item {
            width: 64px; height: 84px;
            border-radius: 15px;
            background: #fff;
            box-shadow: 0 4px 32px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .date-item:hover { background: #f0ebff; }
        .date-item.active {
            background: #5f33e1;
        }
        .date-item .month {
            font-size: 11px;
            font-weight: 400;
            color: #24252c;
        }
        .date-item.active .month,
        .date-item.active .day-num,
        .date-item.active .weekday { color: #fff; }
        .date-item .day-num {
            font-size: 19px;
            font-weight: 600;
            color: #24252c;
            line-height: 1;
        }
        .date-item .weekday {
            font-size: 11px;
            font-weight: 400;
            color: #24252c;
        }

        /* ── Filter tabs ── */
        .filter-tabs {
            display: flex;
            gap: 8px;
            padding: 16px 22px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            font-family: 'Lexend Deca', sans-serif;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #5f33e1;
            color: #fff;
            font-weight: 600;
        }
        .tab-btn:not(.active) {
            background: transparent;
            color: #5f33e1;
            border: 1.5px solid #e8e0ff;
        }

        /* ── Task cards ── */
        .task-list {
            padding: 20px 22px 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .task-card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.05);
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: #aaa;
        }

        .task-left {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }
        .task-project {
            font-size: 11px;
            font-weight: 400;
            color: #6e6a7c;
        }
        .task-title {
            font-size: 14px;
            font-weight: 400;
            color: #24252c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-time {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }
        .task-time svg { flex-shrink: 0; }
        .task-time span {
            font-size: 11px;
            color: #ab94ff;
        }

        .task-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }
        .task-icon-badge {
            width: 24px; height: 24px;
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
        }
        .task-icon-badge svg { width: 14px; height: 14px; }
        .badge-pink   { background: #ffe4f2; }
        .badge-purple { background: #ede4ff; }
        .badge-orange { background: #ffe6d4; }
        .badge-blue   { background: #e3f2ff; }

        .status-badge {
            font-size: 9px;
            font-weight: 400;
            padding: 3px 8px;
            border-radius: 7px;
            white-space: nowrap;
        }
        .status-done        { background: #ede8ff; color: #5f33e1; }
        .status-inprogress  { background: #ffe9e1; color: #ff7d53; }
        .status-todo        { background: #e3f2ff; color: #0087ff; }

        /* ── Add task input (floating) ── */
        .add-task-bar {
            position: sticky;
            bottom: 70px;
            padding: 0 22px;
            margin-top: 16px;
        }
        .add-task-row {
            display: flex;
            gap: 8px;
        }
        .add-task-input {
            flex: 1;
            padding: 13px 16px;
            border: 1.5px solid #e8e0ff;
            border-radius: 14px;
            font-family: 'Lexend Deca', sans-serif;
            font-size: 13px;
            color: #24252c;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }
        .add-task-input:focus { border-color: #5f33e1; }
        .add-task-input::placeholder { color: #b0acbf; }
        .add-task-submit {
            width: 46px; height: 46px;
            background: #5f33e1;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .add-task-submit:hover { background: #4a26b0; }
        .add-task-submit svg { width: 20px; height: 20px; }

        /* ── Bottom nav ── */
        .bottom-nav {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 78px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding-bottom: 14px;
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06);
        }
        .nav-item {
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-end;
            gap: 2px;
            cursor: pointer;
            padding: 0 10px;
        }
        .nav-fab {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c4dff 0%, #5f33e1 100%);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 4px;
            box-shadow: 0 4px 16px rgba(95,51,225,0.45);
        }
        .nav-fab svg { width: 24px; height: 24px; }

        .nav-icon {
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.45;
        }
        .nav-icon.active { opacity: 1; }
        .nav-icon svg { width: 22px; height: 22px; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 40px 22px;
            color: #b0acbf;
        }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 13px; }
    </style>
</head>
<body>
<div class="phone-wrapper">
    <div class="bg-blobs"></div>
    <div class="content">

        <!-- Top bar -->
        <div class="topbar">
            <div class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="#24252c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </div>
            <h1>Today's Tasks</h1>
            <div class="notif-btn">
                <svg viewBox="0 0 24 24" fill="#24252c" width="24" height="24">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                </svg>
                <div class="notif-dot"></div>
            </div>
        </div>

        <!-- Date picker -->
        <div class="date-picker" id="date-picker"></div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
            <button class="tab-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
            <button class="tab-btn" data-filter="todo" onclick="setFilter(this,'todo')">To do</button>
            <button class="tab-btn" data-filter="inprogress" onclick="setFilter(this,'inprogress')">In Progress</button>
            <button class="tab-btn" data-filter="done" onclick="setFilter(this,'done')">Completed</button>
        </div>

        <!-- Task list -->
        <div class="task-list" id="task-list"></div>

        <!-- Add task bar -->
        <div class="add-task-bar">
            <div class="add-task-row">
                <input class="add-task-input" id="task-input" type="text" placeholder="Add a new task..." maxlength="100">
                <button class="add-task-submit" onclick="addTask()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>

    </div><!-- /content -->

    <!-- Bottom nav -->
    <div class="bottom-nav">
        <div class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="#24252c"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
        </div>
        <div class="nav-item">
            <div class="nav-icon active">
                <svg viewBox="0 0 24 24" fill="#5f33e1"><rect x="3" y="4" width="18" height="18" rx="3" ry="3"/><line x1="16" y1="2" x2="16" y2="6" stroke="#fff" stroke-width="2"/><line x1="8" y1="2" x2="8" y2="6" stroke="#fff" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="2"/></svg>
            </div>
        </div>
        <div class="nav-item">
            <div class="nav-fab">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="#24252c"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8" fill="none" stroke="#24252c" stroke-width="2"/></svg>
            </div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="#24252c"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
        </div>
    </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────
const STATUS = { todo: 'todo', inprogress: 'inprogress', done: 'done' };

const STATUS_LABEL = {
    todo:       'To-do',
    inprogress: 'In Progress',
    done:       'Done'
};
const STATUS_CLASS = {
    todo:       'status-todo',
    inprogress: 'status-inprogress',
    done:       'status-done'
};
const ICON_BADGE = [
    { cls: 'badge-pink',   svg: '<svg viewBox="0 0 24 24" fill="#e879a0"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z"/></svg>' },
    { cls: 'badge-purple', svg: '<svg viewBox="0 0 24 24" fill="#7c4dff"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><circle cx="12" cy="14" r="2" fill="#fff"/></svg>' },
    { cls: 'badge-orange', svg: '<svg viewBox="0 0 24 24" fill="#ff7d53"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' },
    { cls: 'badge-blue',   svg: '<svg viewBox="0 0 24 24" fill="#0087ff"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' },
];

let tasks = JSON.parse(localStorage.getItem('tasks-figma')) || [
    { id: 1, project: 'Grocery shopping app design', title: 'Market Research',              time: '10:00 AM', status: 'done',       iconIdx: 0 },
    { id: 2, project: 'Grocery shopping app design', title: 'Competitive Analysis',         time: '12:00 PM', status: 'inprogress', iconIdx: 0 },
    { id: 3, project: 'Uber Eats redesign challange', title: 'Create Low-fidelity Wireframe',time: '07:00 PM', status: 'todo',       iconIdx: 1 },
    { id: 4, project: 'About design sprint',         title: 'How to pitch a Design Sprint', time: '09:00 PM', status: 'todo',       iconIdx: 2 },
];

let currentFilter = 'all';

// ── Date picker ───────────────────────────────────────
function buildDatePicker() {
    const picker = document.getElementById('date-picker');
    const today = new Date();
    const days  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    picker.innerHTML = '';
    for (let i = -2; i <= 2; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const el = document.createElement('div');
        el.className = 'date-item' + (i === 0 ? ' active' : '');
        el.innerHTML = `
            <span class="month">${months[d.getMonth()]}</span>
            <span class="day-num">${d.getDate()}</span>
            <span class="weekday">${days[d.getDay()]}</span>`;
        el.onclick = () => {
            document.querySelectorAll('.date-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
        };
        picker.appendChild(el);
    }
}

// ── Filter ────────────────────────────────────────────
function setFilter(btn, filter) {
    currentFilter = filter;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
}

// ── Render ────────────────────────────────────────────
function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTasks() {
    const list = document.getElementById('task-list');
    const filtered = tasks.filter(t => currentFilter === 'all' || t.status === currentFilter);

    if (filtered.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="#b0acbf" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="3"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
                <p>No tasks here yet!</p>
            </div>`;
        return;
    }

    list.innerHTML = filtered.map(t => {
        const badge = ICON_BADGE[t.iconIdx % ICON_BADGE.length];
        return `
        <div class="task-card${t.status === 'done' ? ' completed' : ''}" id="task-${t.id}">
            <div class="task-left">
                <span class="task-project">${escapeHtml(t.project)}</span>
                <span class="task-title">${escapeHtml(t.title)}</span>
                <div class="task-time">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="#ab94ff">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14" stroke="#fff" stroke-width="2" fill="none"/>
                    </svg>
                    <span>${escapeHtml(t.time)}</span>
                </div>
            </div>
            <div class="task-right">
                <div class="task-icon-badge ${badge.cls}" onclick="cycleStatus(${t.id})" title="Change status">
                    ${badge.svg}
                </div>
                <span class="status-badge ${STATUS_CLASS[t.status]}">${STATUS_LABEL[t.status]}</span>
            </div>
        </div>`;
    }).join('');
}

// ── Add task ──────────────────────────────────────────
function addTask() {
    const input = document.getElementById('task-input');
    const title = input.value.trim();
    if (!title) return;
    const now = new Date();
    const h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = ((h % 12) || 12);
    const newTask = {
        id: Date.now(),
        project: 'My Project',
        title,
        time: `${String(h12).padStart(2,'0')}:${m} ${ampm}`,
        status: 'todo',
        iconIdx: Math.floor(Math.random() * ICON_BADGE.length)
    };
    tasks.unshift(newTask);
    saveTasks();
    input.value = '';
    renderTasks();
}

// ── Cycle status on icon tap ──────────────────────────
function cycleStatus(id) {
    const order = ['todo','inprogress','done'];
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.status = order[(order.indexOf(t.status) + 1) % order.length];
    saveTasks();
    renderTasks();
}

function saveTasks() {
    localStorage.setItem('tasks-figma', JSON.stringify(tasks));
}

// ── Enter key ─────────────────────────────────────────
document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
});

// ── Init ──────────────────────────────────────────────
buildDatePicker();
renderTasks();
</script>
</body>
</html>
