<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办事项</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9em;
            color: #666;
            flex-wrap: wrap;
        }

        .stats span {
            padding: 5px 15px;
            background: #f0f0f0;
            border-radius: 20px;
        }

        .add-task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #task-input {
            flex: 1;
            min-width: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #task-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #priority-select {
            padding: 15px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95em;
            cursor: pointer;
            background: white;
            color: #333;
            transition: border-color 0.3s;
        }

        #priority-select:focus {
            outline: none;
            border-color: #667eea;
        }

        #add-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        #add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #add-btn:active {
            transform: translateY(0);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            font-size: 0.9em;
        }

        .filter-btn:hover {
            background: #e0e0e0;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .task-list {
            list-style: none;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-list::-webkit-scrollbar {
            width: 8px;
        }

        .task-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
            gap: 10px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .task-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-text {
            flex: 1;
            color: #333;
            font-size: 1em;
            word-break: break-word;
        }

        .priority-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .priority-badge.high   { background: #ff4757; color: #fff; }
        .priority-badge.medium { background: #ffa502; color: #fff; }
        .priority-badge.low    { background: #2ed573; color: #fff; }

        .task-time {
            font-size: 0.8em;
            color: #999;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #ff3838;
            transform: scale(1.05);
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .clear-btn {
            padding: 10px 25px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .clear-btn:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .clear-btn.danger { background: #e74c3c; }
        .clear-btn.danger:hover { background: #c0392b; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon { font-size: 4em; margin-bottom: 10px; }
        .empty-state-text { font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 我的待办事项</h1>
            <div class="stats">
                <span id="stat-total">总计: 0</span>
                <span id="stat-completed">已完成: 0</span>
                <span id="stat-pending">待完成: 0</span>
            </div>
        </header>

        <div class="add-task-form">
            <input type="text" id="task-input" placeholder="添加新任务..." maxlength="200">
            <select id="priority-select">
                <option value="high">🔴 高</option>
                <option value="medium" selected>🟡 中</option>
                <option value="low">🟢 低</option>
            </select>
            <button id="add-btn" onclick="addTask()">添加</button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterTasks('all')">全部</button>
            <button class="filter-btn" onclick="filterTasks('pending')">待完成</button>
            <button class="filter-btn" onclick="filterTasks('completed')">已完成</button>
        </div>

        <ul class="task-list" id="task-list"></ul>

        <div class="actions">
            <button class="clear-btn" onclick="clearCompleted()">清除已完成</button>
            <button class="clear-btn danger" onclick="clearAll()">清除全部</button>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        const priorityLabels = { high: '高', medium: '中', low: '低' };

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const prioritySelect = document.getElementById('priority-select');
            const text = input.value.trim();
            if (!text) return;

            const task = {
                id: Date.now(),
                text,
                completed: false,
                createdAt: new Date().toLocaleString('zh-CN'),
                priority: prioritySelect.value
            };
            tasks.unshift(task);
            saveTasks();
            input.value = '';
            prioritySelect.value = 'medium';
            renderTasks();
            updateStats();
            input.focus();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function deleteTask(id) {
            if (confirm('确定要删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        function clearCompleted() {
            const count = tasks.filter(t => t.completed).length;
            if (count === 0) { alert('没有已完成的任务！'); return; }
            if (confirm(`确定要清除 ${count} 个已完成的任务吗？`)) {
                tasks = tasks.filter(t => !t.completed);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function clearAll() {
            if (tasks.length === 0) { alert('任务列表已经是空的！'); return; }
            if (confirm('确定要清除所有任务吗？此操作不可撤销！')) {
                tasks = [];
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            const filtered = tasks.filter(task => {
                if (currentFilter === 'pending') return !task.completed;
                if (currentFilter === 'completed') return task.completed;
                return true;
            });

            if (filtered.length === 0) {
                const msgs = { all: '还没有任务，开始添加吧！', pending: '没有待完成的任务！', completed: '没有已完成的任务！' };
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">${msgs[currentFilter]}</div>
                    </div>`;
                return;
            }

            list.innerHTML = filtered.map(task => `
                <li class="task-item${task.completed ? ' completed' : ''}">
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})">
                    <span class="task-text">${escapeHtml(task.text)}</span>
                    <span class="priority-badge ${task.priority ?? 'medium'}">${priorityLabels[task.priority ?? 'medium']}</span>
                    <span class="task-time">${task.createdAt}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">删除</button>
                </li>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('stat-total').textContent = `总计: ${total}`;
            document.getElementById('stat-completed').textContent = `已完成: ${completed}`;
            document.getElementById('stat-pending').textContent = `待完成: ${total - completed}`;
        }

        document.getElementById('task-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
        });

        renderTasks();
        updateStats();
    </script>
</body>
</html>
